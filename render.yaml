services:
  - type: web
    name: kryn
    runtime: node
    plan: starter
    rootDir: .
    buildCommand: npm run install:all && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    disk:
      name: kryn-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_FILE
        value: /var/data/cms.sqlite
      - key: UPLOADS_DIR
        value: /var/data/uploads
      - key: SESSION_SECRET
        generateValue: true
