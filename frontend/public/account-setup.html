<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Karyn Wilkins — Account Setup</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: #FAF6F3;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      padding: 48px 40px;
      text-align: center;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 4px 32px rgba(90,58,90,0.12);
    }
    .logo { font-size: 1.3rem; color: #5A3A5A; margin-bottom: 24px; }
    .logo em { font-style: italic; color: #C9949B; }
    h2 { font-size: 1.4rem; font-weight: 400; color: #5A3A5A; margin-bottom: 12px; }
    p { color: #8A7A86; font-size: 0.9rem; line-height: 1.7; }
    .spinner {
      width: 36px; height: 36px;
      border: 2px solid #E8C4C8;
      border-top-color: #5A3A5A;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 24px auto 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Karyn Wilkins <em>Hypnotherapy</em></div>
    <h2>Setting up your account</h2>
    <p>Please wait while we prepare your login...</p>
    <div class="spinner"></div>
  </div>

  <script>
    function tryOpen() {
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("login", function() {
          document.location.href = "/admin/";
        });
        window.netlifyIdentity.on("passwordRecovery", function() {
          window.netlifyIdentity.open("login");
        });
        window.netlifyIdentity.open();
      } else {
        setTimeout(tryOpen, 400);
      }
    }
    window.addEventListener("load", function() {
      setTimeout(tryOpen, 600);
    });
  </script>
</body>
</html>
